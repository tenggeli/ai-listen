<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>listen 陪伴 · 基础资料补全</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#091621;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;color:#eff7fb}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;opacity:.5}
body::before{width:300px;height:300px;background:#174665;left:-120px;top:-70px}
body::after{width:300px;height:300px;background:#1d7895;right:-120px;bottom:-120px}
.phone{position:relative;z-index:1;max-width:390px;margin:0 auto;min-height:100vh;padding:50px 18px 28px}
.topline{display:flex;justify-content:space-between;color:rgba(255,255,255,.35);font-size:12px;padding:0 6px}
.progress{margin-top:18px;padding:18px 18px 14px;border-radius:24px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}
.progress-row{display:flex;justify-content:space-between;align-items:center}
.progress-title{font-size:20px;font-weight:500}
.progress-step{font-size:12px;color:#8bdcff}
.bar{margin-top:12px;height:8px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}
.fill{height:100%;width:52%;background:linear-gradient(90deg,#7fddff,#4dbde6);border-radius:999px}
.progress p{margin-top:10px;color:rgba(239,247,251,.62);line-height:1.7;font-size:13px}
.card{margin-top:16px;padding:20px;border-radius:26px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(16px)}
.avatar-wrap{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.avatar{width:72px;height:72px;border-radius:24px;background:linear-gradient(135deg,rgba(115,213,255,.28),rgba(115,213,255,.08));border:1px solid rgba(115,213,255,.28);display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 0 30px rgba(115,213,255,.16)}
.avatar-copy strong{display:block;font-size:15px}
.avatar-copy span{display:block;margin-top:6px;color:rgba(239,247,251,.58);font-size:12px;line-height:1.7}
.avatar-btn{margin-left:auto;padding:10px 14px;border-radius:14px;border:1px solid rgba(115,213,255,.24);background:rgba(115,213,255,.08);color:#8fe0ff;font-size:12px}
.field{margin-top:14px}
.label{display:block;font-size:12px;color:rgba(255,255,255,.42);margin-bottom:8px}
.input,.select{width:100%;padding:14px 16px;border-radius:16px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#eff7fb;font-size:14px;outline:none}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gender-group,.tag-row{display:flex;gap:10px;flex-wrap:wrap}
.gender,.tag{padding:11px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.03);color:rgba(239,247,251,.6);font-size:13px}
.gender.active,.tag.active{background:rgba(115,213,255,.12);border-color:rgba(115,213,255,.3);color:#93e0ff}
.tip{margin-top:10px;font-size:12px;line-height:1.7;color:rgba(239,247,251,.48)}
.actions{display:flex;gap:10px;margin-top:18px}
.ghost,.primary{flex:1;border:none;border-radius:18px;padding:15px 16px;font-size:14px;font-weight:600}
.ghost{background:rgba(255,255,255,.05);color:rgba(239,247,251,.7);border:1px solid rgba(255,255,255,.08)}
.primary{background:linear-gradient(135deg,#93e0ff,#56bee8);color:#082133;box-shadow:0 12px 28px rgba(86,190,232,.22)}
.notice{margin-top:16px;padding:16px 18px;border-radius:20px;background:rgba(10,35,49,.72);border:1px solid rgba(255,255,255,.06);font-size:12px;line-height:1.8;color:rgba(239,247,251,.62)}
.prototype-link,.flow-nav a{text-decoration:none}
.prototype-link{position:fixed;top:16px;right:16px;z-index:12;padding:10px 14px;border-radius:999px;background:rgba(7,25,38,.82);border:1px solid rgba(143,223,255,.22);color:#9ae4ff;font-size:12px;backdrop-filter:blur(18px);box-shadow:0 12px 28px rgba(0,0,0,.18)}
.flow-nav{position:fixed;top:62px;right:16px;z-index:12;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.flow-nav a{padding:9px 12px;border-radius:999px;background:rgba(7,25,38,.78);border:1px solid rgba(255,255,255,.09);color:rgba(239,247,251,.78);font-size:12px;backdrop-filter:blur(18px)}
</style>
</head>
<body>
<a class="prototype-link" href="./listen_prototype_hub.html">原型总览</a>
<div class="flow-nav">
  <a href="./listen_page_auth_entry.html">上一页: 登录注册</a>
  <a href="./listen_page_personality_setup.html">下一页: 性格设置</a>
</div>
  <main class="phone">
    <div class="topline"><span>20:28</span><span>首次资料补全</span></div>

    <section class="progress">
      <div class="progress-row">
        <div class="progress-title">先认识你一下</div>
        <div class="progress-step">步骤 1 / 2</div>
      </div>
      <div class="bar"><div class="fill"></div></div>
      <p>为了让首页推荐、对话语气和服务匹配更贴近你，首次登录后需要先完成基础资料。性格设置会放在下一步，并支持跳过。</p>
    </section>

    <section class="card">
      <div class="avatar-wrap">
        <div class="avatar">🌙</div>
        <div class="avatar-copy">
          <strong>头像与昵称</strong>
          <span>先给自己一个容易被记住的样子，后续可在“我的”里继续修改。</span>
        </div>
        <button class="avatar-btn">更换头像</button>
      </div>

      <div class="field">
        <label class="label">昵称</label>
        <input class="input" value="今晚想被抱抱" />
      </div>

      <div class="field">
        <label class="label">性别</label>
        <div class="gender-group">
          <div class="gender active">女</div>
          <div class="gender">男</div>
          <div class="gender">暂不透露</div>
        </div>
        <div class="tip">性别仅允许选择一次，再次修改前需二次确认。</div>
      </div>

      <div class="grid">
        <div class="field">
          <label class="label">年龄段</label>
          <div class="select">25-29 岁</div>
        </div>
        <div class="field">
          <label class="label">所在城市</label>
          <div class="select">上海</div>
        </div>
      </div>

      <div class="field">
        <label class="label">兴趣标签（基础）</label>
        <div class="tag-row">
          <div class="tag active">深夜聊天</div>
          <div class="tag active">电影</div>
          <div class="tag">散步</div>
          <div class="tag active">治愈声音</div>
          <div class="tag">咖啡馆</div>
          <div class="tag">展览</div>
        </div>
      </div>

      <div class="actions">
        <button class="ghost">稍后再填</button>
        <button class="primary">继续设置性格</button>
      </div>
    </section>

    <div class="notice">交互说明：如果用户未完善基础资料，登录成功后强制进入本页。完成后进入“性格设置”页面，引导配置兴趣偏好与 MBTI。</div>
  </main>
<script>
function go(url){window.location.href=url;}
document.querySelector(".actions .ghost")?.addEventListener("click",()=>go("./listen_home_v2_dark.html"));
document.querySelector(".actions .primary")?.addEventListener("click",()=>go("./listen_page_personality_setup.html"));
</script>
</body>
</html>
