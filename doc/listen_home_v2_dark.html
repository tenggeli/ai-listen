<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>listen 陪伴 · 首页</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d1f2d;
    min-height: 100vh;
    font-family: -apple-system, 'PingFang SC', sans-serif;
    display: flex; flex-direction: column; overflow-x: hidden;
    overflow-y: auto;
  }

  /* 背景光晕 */
  .bg-glow {
    position: fixed; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 60% 40% at 50% 30%, rgba(74,168,196,0.09) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 20% 70%, rgba(40,100,140,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 30% 30% at 80% 80%, rgba(74,100,196,0.04) 0%, transparent 60%);
  }

  /* 星点 */
  .stars { position: fixed; inset: 0; pointer-events: none; }
  .star { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.5); animation: twinkle var(--d,4s) ease-in-out infinite var(--delay,0s); }
  @keyframes twinkle { 0%,100%{opacity:0.2} 50%{opacity:0.8} }

  /* 状态栏 */
  .status-bar {
    position: fixed; top: 0; left: 0; right: 0; height: 44px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; font-size: 12px; color: rgba(255,255,255,0.3); z-index: 10;
  }

  /* 主容器 */
  .main-container {
    display: flex; flex-direction: column; align-items: center;
    width: 100%; max-width: 390px; margin: 0 auto;
    padding: 52px 0 100px;
    position: relative; z-index: 1;
    min-height: 100vh;
  }

  /* ══════════════════════ 上半部分 ══════════════════════ */

  /* 顶部品牌+通知栏 */
  .top-nav {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    padding: 10px 24px 0;
  }
  .brand-logo-row { display: flex; flex-direction: column; align-items: flex-start; }
  .brand-name {
    font-size: 17px; font-weight: 300; letter-spacing: 5px;
    color: rgba(255,255,255,0.85);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
  .brand-sub { font-size: 10px; letter-spacing: 4px; color: #4aa8c4; margin-top: 1px; }
  .top-nav-actions { display: flex; gap: 10px; align-items: center; }
  .nav-icon-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: rgba(255,255,255,0.5); font-size: 14px;
    position: relative;
  }
  .badge {
    position: absolute; top: 4px; right: 4px;
    width: 7px; height: 7px; border-radius: 50%;
    background: #4aa8c4; border: 1.5px solid #0d1f2d;
  }

  /* 问候语区 */
  .greeting-section {
    width: 100%; padding: 16px 24px 0;
  }
  .greeting-time { font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 1px; margin-bottom: 4px; }
  .greeting-text { font-size: 22px; font-weight: 300; color: rgba(255,255,255,0.88); letter-spacing: 1px; line-height: 1.4; }
  .greeting-sub { font-size: 13px; color: rgba(74,168,196,0.7); margin-top: 4px; letter-spacing: 0.5px; }

  /* 今日状态卡片 */
  .status-card {
    margin: 16px 24px 0;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(74,168,196,0.15);
    border-radius: 18px; padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between;
    backdrop-filter: blur(10px);
  }
  .status-left { display: flex; align-items: center; gap: 12px; }
  .status-mood-dot {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, rgba(74,168,196,0.25), rgba(74,168,196,0.08));
    border: 1.5px solid rgba(74,168,196,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .status-info-text .s-label { font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 0.5px; }
  .status-info-text .s-value { font-size: 14px; color: rgba(255,255,255,0.75); margin-top: 2px; font-weight: 400; }
  .status-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .status-weather { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 0.3px; }
  .status-days { font-size: 11px; color: rgba(74,168,196,0.6); letter-spacing: 0.3px; }

  /* 快捷功能入口 */
  .quick-actions {
    width: 100%; padding: 16px 24px 0;
    display: flex; gap: 10px;
  }
  .quick-btn {
    flex: 1; padding: 12px 8px; border-radius: 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer; transition: all 0.2s;
  }
  .quick-btn:hover {
    background: rgba(74,168,196,0.08);
    border-color: rgba(74,168,196,0.2);
  }
  .quick-btn-icon { font-size: 18px; }
  .quick-btn-label { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 0.5px; }

  /* 分割线 */
  .section-divider {
    width: calc(100% - 48px); margin: 18px 24px 0;
    height: 1px; background: rgba(255,255,255,0.05);
    position: relative;
  }
  .section-divider::after {
    content: "今日陪伴";
    position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
    background: #0d1f2d; padding: 0 12px;
    font-size: 10px; color: rgba(255,255,255,0.2); letter-spacing: 2px;
  }

  /* ══════════════════════ 呼吸圆圈区 ══════════════════════ */

  .breath-area {
    position: relative;
    width: 280px; height: 280px;
    display: flex; align-items: center; justify-content: center;
    margin: 20px auto 0;
  }

  /* 最外层散射光晕 */
  .glow-outer {
    position: absolute;
    width: 280px; height: 280px; border-radius: 50%;
    background: radial-gradient(circle, rgba(74,168,196,0.04) 0%, transparent 70%);
    animation: glowPulse 6s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%,100% { transform: scale(0.9); opacity: 0.5; }
    50% { transform: scale(1.1); opacity: 1; }
  }

  /* 涟漪圆圈 */
  .ripple {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(74,168,196,0.12);
    animation: rippleExpand 5s ease-out infinite;
  }
  .ripple:nth-child(2) { animation-delay: 0s; }
  .ripple:nth-child(3) { animation-delay: 1.2s; }
  .ripple:nth-child(4) { animation-delay: 2.4s; }
  .ripple:nth-child(5) { animation-delay: 3.6s; }
  @keyframes rippleExpand {
    0%   { width:110px; height:110px; opacity:0.7; border-color: rgba(74,168,196,0.25); }
    60%  { opacity:0.3; }
    100% { width:270px; height:270px; opacity:0; border-color: rgba(74,168,196,0.03); }
  }

  /* 中间环 */
  .mid-ring {
    position: absolute;
    width: 175px; height: 175px; border-radius: 50%;
    border: 1px solid rgba(74,168,196,0.14);
    animation: midRingPulse 6s ease-in-out infinite;
  }
  @keyframes midRingPulse {
    0%,100% { transform: scale(0.96); opacity: 0.5; }
    50% { transform: scale(1.04); opacity: 0.9; }
  }

  /* 内环 */
  .inner-ring {
    position: absolute;
    width: 130px; height: 130px; border-radius: 50%;
    border: 1.5px solid rgba(74,168,196,0.22);
    animation: innerRingPulse 6s ease-in-out infinite;
  }
  @keyframes innerRingPulse {
    0%,100% { transform: scale(0.94); border-color: rgba(74,168,196,0.15); }
    50% { transform: scale(1.06); border-color: rgba(74,168,196,0.32); }
  }

  /* 核心圆 */
  .core-circle {
    position: relative; z-index: 5;
    width: 105px; height: 105px; border-radius: 50%;
    background: radial-gradient(circle at 40% 40%,
      rgba(74,168,196,0.18) 0%,
      rgba(20,50,70,0.85) 60%,
      rgba(13,31,45,0.95) 100%
    );
    border: 1.5px solid rgba(74,168,196,0.35);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    box-shadow:
      0 0 50px rgba(74,168,196,0.18),
      0 0 15px rgba(74,168,196,0.12),
      inset 0 0 30px rgba(74,168,196,0.06);
    animation: corePulse 6s ease-in-out infinite;
  }
  @keyframes corePulse {
    0%,100% {
      transform: scale(0.93);
      box-shadow: 0 0 30px rgba(74,168,196,0.12), inset 0 0 20px rgba(74,168,196,0.04);
    }
    50% {
      transform: scale(1.04);
      box-shadow: 0 0 65px rgba(74,168,196,0.28), 0 0 20px rgba(74,168,196,0.15), inset 0 0 35px rgba(74,168,196,0.08);
    }
  }

  /* Logo SVG */
  .logo-icon { width: 46px; height: 46px; }

  /* 核心圆下方小字 */
  .core-sub {
    font-size: 9px; color: rgba(74,168,196,0.5);
    letter-spacing: 2px; margin-top: 5px;
    text-align: center;
  }

  /* 搭子状态指示 */
  .partner-hint {
    margin-top: 14px;
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: rgba(255,255,255,0.3);
    letter-spacing: 0.5px;
  }
  .partner-dot { width: 6px; height: 6px; border-radius: 50%; background: #4aa8c4; animation: dotBlink 2s ease-in-out infinite; }
  @keyframes dotBlink { 0%,100%{opacity:0.3} 50%{opacity:1} }
  .partner-count { color: rgba(74,168,196,0.7); font-weight: 500; }

  /* ══════════════════════ 底部按钮区 ══════════════════════ */

  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 12px 24px 44px;
    background: linear-gradient(transparent, rgba(13,31,45,0.97) 40%);
    z-index: 5;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    max-width: 390px; left: 50%; transform: translateX(-50%);
  }

  /* 主按钮：寻找今天的搭子 */
  .main-btn {
    width: 100%; height: 54px;
    background: rgba(30,65,88,0.9);
    border: 1.5px solid rgba(74,168,196,0.4);
    border-radius: 27px;
    color: rgba(255,255,255,0.88); font-size: 16px;
    letter-spacing: 3px; cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 30px rgba(74,168,196,0.18), inset 0 1px 0 rgba(255,255,255,0.06);
    transition: all 0.25s;
    position: relative; overflow: hidden;
  }
  .main-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(74,168,196,0.08) 50%, transparent 100%);
    animation: btnShimmer 3s ease-in-out infinite;
  }
  @keyframes btnShimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  .main-btn:active { transform: scale(0.98); }

  /* 高级筛选按钮 */
  .filter-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 20px; border-radius: 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.09);
    color: rgba(255,255,255,0.35); font-size: 12px;
    letter-spacing: 1.5px; cursor: pointer;
    font-family: inherit; transition: all 0.2s;
  }
  .filter-btn:active { background: rgba(74,168,196,0.08); border-color: rgba(74,168,196,0.2); color: rgba(74,168,196,0.7); }
  .filter-icon { font-size: 11px; opacity: 0.6; }

  /* 底部导航 */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 82px; padding: 0 0 20px;
    background: rgba(10,22,34,0.97);
    border-top: 1px solid rgba(74,168,196,0.1);
    backdrop-filter: blur(24px);
    display: flex; align-items: center; justify-content: space-around;
    z-index: 20; max-width: 390px; left: 50%; transform: translateX(-50%);
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; padding: 8px 10px; border-radius: 14px;
    transition: all 0.22s; position: relative;
  }
  .nav-item.active .nav-svg-icon { stroke: #4aa8c4; }
  .nav-item.active .nav-label { color: #4aa8c4; }
  /* 中间「加入」特殊凸起样式 */
  .nav-item.nav-center {
    margin-top: -18px;
    background: linear-gradient(145deg, rgba(74,168,196,0.22), rgba(30,70,100,0.6));
    border: 1.5px solid rgba(74,168,196,0.38);
    border-radius: 50%; width: 56px; height: 56px;
    padding: 0; justify-content: center;
    box-shadow: 0 0 24px rgba(74,168,196,0.22), 0 -2px 10px rgba(74,168,196,0.1);
  }
  .nav-item.nav-center .nav-svg-icon { stroke: #4aa8c4; }
  .nav-item.nav-center .nav-label {
    position: absolute; bottom: -18px;
    font-size: 9px; color: rgba(74,168,196,0.7); letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .nav-svg-icon { transition: stroke 0.2s; }
  .nav-icon-wrap { display: flex; align-items: center; justify-content: center; }
  .nav-label { font-size: 9px; color: rgba(255,255,255,0.22); letter-spacing: 0.5px; }
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="stars" id="stars"></div>

<!-- 状态栏 -->
<div class="status-bar">
  <span id="curTime">13:24</span>
  <span style="letter-spacing:1px;">···</span>
</div>

<!-- 主容器 -->
<div class="main-container">

  <!-- 顶部导航 -->
  <div class="top-nav">
    <div class="brand-logo-row">
      <div class="brand-name">listen</div>
      <div class="brand-sub">陪 伴</div>
    </div>
    <div class="top-nav-actions">
      <div class="nav-icon-btn">
        <!-- 搜索图标 -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/>
        </svg>
      </div>
      <div class="nav-icon-btn">
        <div class="badge"></div>
        <!-- 通知图标 -->
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- 问候语 -->
  <div class="greeting-section">
    <div class="greeting-time" id="greetingPeriod">下午好 · 周日</div>
    <div class="greeting-text">今天，遇见懂你的人</div>
    <div class="greeting-sub">有 <span style="color:#4aa8c4;font-weight:500;">1,247</span> 位搭子正在等待陪伴</div>
  </div>

  <!-- 今日状态卡 -->
  <div class="status-card" style="width:calc(100% - 48px)">
    <div class="status-left">
      <div class="status-mood-dot">🌙</div>
      <div class="status-info-text">
        <div class="s-label">今日心情</div>
        <div class="s-value">平静 · 有点想聊聊</div>
      </div>
    </div>
    <div class="status-right">
      <div class="status-weather">🌤 21°C  微风</div>
      <div class="status-days">已陪伴 28 天</div>
    </div>
  </div>

  <!-- 快捷入口：对应5个导航功能的延伸入口 -->
  <div class="quick-actions">
    <div class="quick-btn" onclick="">
      <div class="quick-btn-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="#4aa8c4" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="9" cy="7" r="4" stroke="#4aa8c4" stroke-width="1.8"/>
          <line x1="19" y1="8" x2="19" y2="14" stroke="#4aa8c4" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="22" y1="11" x2="16" y2="11" stroke="#4aa8c4" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="quick-btn-label">快速加入</div>
    </div>
    <div class="quick-btn">
      <div class="quick-btn-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="3" stroke="#7ec8dc" stroke-width="1.8"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"
                stroke="#7ec8dc" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="quick-btn-label">热门广场</div>
    </div>
    <div class="quick-btn">
      <div class="quick-btn-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"
                   stroke="#aadde9" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="#aadde9" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="quick-btn-label">治愈声音</div>
    </div>
    <div class="quick-btn">
      <div class="quick-btn-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"
                stroke="rgba(180,210,225,0.7)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="quick-btn-label">今日话题</div>
    </div>
  </div>

  <!-- 分割线 -->
  <div class="section-divider"></div>

  <!-- 呼吸圆圈 -->
  <div class="breath-area">
    <div class="glow-outer"></div>
    <div class="ripple"></div>
    <div class="ripple"></div>
    <div class="ripple"></div>
    <div class="ripple"></div>
    <div class="mid-ring"></div>
    <div class="inner-ring"></div>

    <!-- 核心圆：logo -->
    <div class="core-circle">
      <svg class="logo-icon" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- 左侧声波 内弧 -->
        <path d="M37 37 C33 41 33 49 37 53"
              stroke="#7ec8dc" stroke-width="2.6" stroke-linecap="round" fill="none"/>
        <!-- 左侧声波 外弧 -->
        <path d="M30 31 C24 37 24 53 30 59"
              stroke="#aadde9" stroke-width="2.2" stroke-linecap="round" fill="none"/>
        <!-- 耳廓主体：开口朝右下 -->
        <path d="M64 62
                 C58 72 46 74 38 66
                 C28 56 28 40 36 31
                 C44 22 58 22 66 32
                 L64 36"
              stroke="#4aa8c4" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <!-- 开口小钩 -->
        <path d="M64 36 C70 40 70 52 64 56"
              stroke="#4aa8c4" stroke-width="3.0" stroke-linecap="round" fill="none"/>
        <!-- 耳内螺旋 -->
        <path d="M60 40 C62 50 56 60 50 62 C47 63 46 66 50 68 C53 70 57 68 57 64"
              stroke="#4aa8c4" stroke-width="2.6" stroke-linecap="round" fill="none"/>
      </svg>
      <div class="core-sub">listen</div>
    </div>
  </div>

  <!-- 搭子在线提示 -->
  <div class="partner-hint">
    <div class="partner-dot"></div>
    <span><span class="partner-count">312</span> 位搭子正在线</span>
  </div>

  <!-- 占位空间（底部按钮占据） -->
  <div style="height:130px;"></div>

</div>

<!-- 底部主操作区（悬浮） -->
<div class="bottom-bar">
  <button class="main-btn" onclick="this.style.opacity=0.8;setTimeout(()=>this.style.opacity=1,200)">
    寻找今天的搭子
  </button>
  <button class="filter-btn">
    <span class="filter-icon">⚙</span>
    高级筛选
  </button>
</div>

<!-- 底部导航栏：首页 / 加入 / 广场 / 声音 / 我的 -->
<div class="bottom-nav">

  <!-- 首页 -->
  <div class="nav-item active" onclick="switchTab(this,'home')">
    <div class="nav-icon-wrap">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path class="nav-svg-icon" d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
              stroke="#4aa8c4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline class="nav-svg-icon" points="9 22 9 12 15 12 15 22"
              stroke="#4aa8c4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="nav-label" style="color:#4aa8c4;">首页</div>
  </div>

  <!-- 广场 -->
  <div class="nav-item" onclick="switchTab(this,'square')">
    <div class="nav-icon-wrap">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <circle class="nav-svg-icon" cx="12" cy="12" r="3.5"
                stroke="rgba(255,255,255,0.25)" stroke-width="1.8"/>
        <path class="nav-svg-icon" d="M12 2v3M12 19v3M2 12h3M19 12h3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"
              stroke="rgba(255,255,255,0.25)" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="nav-label">广场</div>
  </div>

  <!-- 加入（中间凸起主按钮） -->
  <div class="nav-item nav-center" onclick="switchTab(this,'join')">
    <div class="nav-icon-wrap">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
        <path class="nav-svg-icon" d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"
              stroke="#4aa8c4" stroke-width="1.8" stroke-linecap="round"/>
        <circle class="nav-svg-icon" cx="9" cy="7" r="4"
                stroke="#4aa8c4" stroke-width="1.8"/>
        <path class="nav-svg-icon" d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"
              stroke="#4aa8c4" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="nav-label">加入</div>
  </div>

  <!-- 声音 -->
  <div class="nav-item" onclick="switchTab(this,'sound')">
    <div class="nav-icon-wrap">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <polygon class="nav-svg-icon" points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"
                 stroke="rgba(255,255,255,0.25)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="nav-svg-icon" d="M15.54 8.46a5 5 0 0 1 0 7.07"
              stroke="rgba(255,255,255,0.25)" stroke-width="1.8" stroke-linecap="round"/>
        <path class="nav-svg-icon" d="M19.07 4.93a10 10 0 0 1 0 14.14"
              stroke="rgba(255,255,255,0.25)" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="nav-label">声音</div>
  </div>

  <!-- 我的 -->
  <div class="nav-item" onclick="switchTab(this,'profile')">
    <div class="nav-icon-wrap">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path class="nav-svg-icon" d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"
              stroke="rgba(255,255,255,0.25)" stroke-width="1.8" stroke-linecap="round"/>
        <circle class="nav-svg-icon" cx="12" cy="7" r="4"
                stroke="rgba(255,255,255,0.25)" stroke-width="1.8"/>
      </svg>
    </div>
    <div class="nav-label">我的</div>
  </div>

</div>

<script>
// 生成星点
const starsEl = document.getElementById('stars');
for (let i = 0; i < 55; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 1.8 + 0.5;
  s.style.cssText = `
    width:${sz}px; height:${sz}px;
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    --d:${3+Math.random()*5}s;
    --delay:${Math.random()*6}s;
    opacity:${0.1+Math.random()*0.5};
  `;
  starsEl.appendChild(s);
}

// 时间 & 问候
function updateTime() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  document.getElementById('curTime').textContent = h + ':' + m;
  const days = ['周日','周一','周二','周三','周四','周五','周六'];
  let period = '早上';
  if (now.getHours() >= 12 && now.getHours() < 18) period = '下午';
  else if (now.getHours() >= 18) period = '晚上';
  document.getElementById('greetingPeriod').textContent = period + '好 · ' + days[now.getDay()];
}
updateTime();
setInterval(updateTime, 10000);

// Tab 配置：每个 tab 对应主按钮文案 & 副文案
const tabConfig = {
  home:    { btn: '寻找今天的搭子',   sub: '高级筛选',  greeting: '今天，遇见懂你的人',   hint: '1,247 位搭子正在等待陪伴' },
  join:    { btn: '立即加入陪伴圈',   sub: '查看全部圈子', greeting: '找到属于你的圈子',  hint: '238 个陪伴圈等你加入' },
  square:  { btn: '逛逛广场',         sub: '发布动态',  greeting: '广场里有人在等你',     hint: '今日 856 条新动态' },
  sound:   { btn: '播放治愈声音',     sub: '我的收藏',  greeting: '用声音抚慰此刻的你',   hint: '精选 120+ 条治愈音频' },
  profile: { btn: '编辑我的资料',     sub: '设置与隐私', greeting: '你好，听说你来了',   hint: '陪伴 28 天 · 24 次连接' },
};

function switchTab(el, key) {
  // 更新 active 状态
  document.querySelectorAll('.nav-item').forEach(item => {
    item.classList.remove('active');
    item.querySelectorAll('.nav-svg-icon').forEach(p => {
      if (!item.classList.contains('nav-center')) {
        p.setAttribute('stroke', 'rgba(255,255,255,0.25)');
      }
    });
    const lbl = item.querySelector('.nav-label');
    if (lbl) lbl.style.color = '';
  });
  el.classList.add('active');
  el.querySelectorAll('.nav-svg-icon').forEach(p => p.setAttribute('stroke', '#4aa8c4'));
  const activeLbl = el.querySelector('.nav-label');
  if (activeLbl) activeLbl.style.color = '#4aa8c4';

  // 更新主按钮 & 问候语
  const cfg = tabConfig[key] || tabConfig.home;
  const mainBtn = document.querySelector('.main-btn');
  const filterBtn = document.querySelector('.filter-btn');
  const greetText = document.querySelector('.greeting-text');
  const greetSub  = document.querySelector('.greeting-sub');

  if (mainBtn) {
    mainBtn.style.opacity = '0';
    setTimeout(() => {
      mainBtn.textContent = cfg.btn;
      mainBtn.style.opacity = '1';
    }, 150);
  }
  if (filterBtn) {
    filterBtn.childNodes[1].textContent = ' ' + cfg.sub;
  }
  if (greetText) {
    greetText.style.opacity = '0';
    setTimeout(() => { greetText.textContent = cfg.greeting; greetText.style.opacity = '1'; }, 150);
  }
  if (greetSub) {
    greetSub.style.opacity = '0';
    setTimeout(() => {
      greetSub.innerHTML = cfg.hint.replace(/[\d,]+/, m => `<span style="color:#4aa8c4;font-weight:500;">${m}</span>`);
      greetSub.style.opacity = '1';
    }, 150);
  }
}

// 过渡动画
document.querySelectorAll('.greeting-text, .greeting-sub, .main-btn').forEach(el => {
  el.style.transition = 'opacity 0.25s ease';
});
</script>
</body>
</html>
