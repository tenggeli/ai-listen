version: "3.9"

services:
  backend:
    image: golang:1.23
    working_dir: /app/backend
    command: go run ./cmd/server
    volumes:
      - ../../:/app
    ports:
      - "8080:8080"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
    volumes:
      - ../nginx/listen.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

