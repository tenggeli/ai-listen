version: "3.9"

services:
  backend:
    image: golang:1.23
    working_dir: /app/backend
    command: go run ./cmd/server
    environment:
      - HTTP_ADDR=:18080
    volumes:
      - ../../:/app
    ports:
      - "18080:18080"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
    volumes:
      - ../nginx/listen.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
